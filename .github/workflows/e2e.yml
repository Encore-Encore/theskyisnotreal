name: E2E

# Playwright user-story tests against a local `wrangler dev` (the real Worker +
# assets). Runs on every PR so a regression in the scan / share / OG / signup /
# trust-page flows is caught before merge. Make it a required check in branch
# protection if you want it to hard-block merges.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
