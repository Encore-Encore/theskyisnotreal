name: CI

# Runs the Worker/API test suite on every push and PR. This is the gate that
# catches regressions (email validation, D1 writes, status codes) before a
# manual `wrangler deploy`. Deploys stay separate — GitHub tests, Cloudflare ships.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
