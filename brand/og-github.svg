<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1026"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8b96dc"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <!-- same art as og-image.svg, padded (translate 40,5) into the wider 2:1 frame -->
  <g transform="translate(40,5)">
    <!-- scattered stars -->
    <g fill="#ffffff">
      <circle cx="120" cy="90" r="2"/><circle cx="300" cy="160" r="1.5" opacity="0.7"/>
      <circle cx="980" cy="120" r="2.2"/><circle cx="1080" cy="230" r="1.4" opacity="0.6"/>
      <circle cx="200" cy="470" r="1.6" opacity="0.7"/><circle cx="1040" cy="520" r="2"/>
      <circle cx="640" cy="70" r="1.3" opacity="0.6"/><circle cx="860" cy="430" r="1.6" opacity="0.7"/>
    </g>
    <text x="80" y="300" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="120" font-weight="800" letter-spacing="-4" fill="url(#title)">the sky</text>
    <text x="80" y="420" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="120" font-weight="800" letter-spacing="-4" fill="url(#title)">is not real</text>
    <text x="84" y="500" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
          font-size="34" font-weight="600" letter-spacing="1" fill="#4dd6ff">Wake up. Look up. Doubt everything.</text>
  </g>
</svg>
